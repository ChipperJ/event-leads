# Applies pending SQL in supabase/migrations/ to your hosted Supabase project.
# Repository secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_ID
# Installs Supabase CLI via npm (avoids supabase/setup-cli Node 20 deprecation notices on Actions).
name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Verify secrets are present
        run: |
          set -e
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then echo "::error::Secret SUPABASE_ACCESS_TOKEN is empty or missing."; missing=1; fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then echo "::error::Secret SUPABASE_DB_PASSWORD is empty or missing."; missing=1; fi
          if [ -z "${SUPABASE_PROJECT_ID}" ]; then echo "::error::Secret SUPABASE_PROJECT_ID is empty or missing."; missing=1; fi
          exit "$missing"

      - name: Link project and push migrations
        run: |
          set -euo pipefail
          supabase --version
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
          supabase db push
