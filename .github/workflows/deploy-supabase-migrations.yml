# Applies pending SQL in supabase/migrations/ to your hosted Supabase project.
# Secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_ID
name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Run JavaScript actions (checkout) on Node 24; silences Node 20 deprecation notices
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v6

      # Official Linux binary (avoids npm global install issues on the runner)
      - name: Install Supabase CLI
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz" -o /tmp/supabase.tgz
          sudo tar -xzf /tmp/supabase.tgz -C /usr/local/bin
          sudo chmod +x /usr/local/bin/supabase
          supabase --version
          rm -f /tmp/supabase.tgz

      - name: Verify secrets are present
        run: |
          set -e
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then echo "::error::Secret SUPABASE_ACCESS_TOKEN is empty or missing."; missing=1; fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then echo "::error::Secret SUPABASE_DB_PASSWORD is empty or missing."; missing=1; fi
          if [ -z "${SUPABASE_PROJECT_ID}" ]; then echo "::error::Secret SUPABASE_PROJECT_ID is empty or missing."; missing=1; fi
          exit "$missing"

      - name: Link project and push migrations
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --yes
